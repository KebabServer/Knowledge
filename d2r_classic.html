<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Page Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f5f5f7;
            overflow: hidden;
        }

        /* Left Side: Content Viewer */
        #content-viewer {
            flex: 1;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }

        #placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #86868b;
            text-align: center;
            padding: 20px;
        }

        /* Right Side: Sidebar */
        #sidebar {
            width: 300px;
            height: 100%;
            background-color: #ffffff;
            border-left: 1px solid #d2d2d7;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5ea;
        }

        .btn-load {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-load:hover {
            background-color: #0077ed;
        }

        #page-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 10px;
        }

        #page-list li {
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #1d1d1f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background-color 0.2s, color 0.2s;
        }

        #page-list li:hover {
            background-color: #f5f5f7;
        }

        #page-list li.active {
            background-color: #e8f2ff;
            color: #0071e3;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="placeholder">
        <h2>No Page Loaded</h2>
        <p>Click "Load Folder" on the right to select your subwebpages.</p>
    </div>
    <iframe id="content-viewer" style="display: none;"></iframe>

    <div id="sidebar">
        <div class="sidebar-header">
            <button class="btn-load" id="load-btn">Load Folder</button>
        </div>
        <ul id="page-list">
            </ul>
    </div>

    <script>
        const loadBtn = document.getElementById('load-btn');
        const pageList = document.getElementById('page-list');
        const contentViewer = document.getElementById('content-viewer');
        const placeholder = document.getElementById('placeholder');

        // Object to temporarily store file data URLs
        let fileMap = {};

        loadBtn.addEventListener('click', async () => {
            try {
                // Open directory picker
                const dirHandle = await window.showDirectoryPicker();
                
                // Clear previous results
                pageList.innerHTML = '';
                fileMap = {};
                
                // Iterate through files in the directory
                for await (const entry of dirHandle.values()) {
                    if (entry.kind === 'file' && entry.name.endsWith('.html')) {
                        const file = await entry.getFile();
                        
                        // Create a local URL for the file so the iframe can read it
                        const fileURL = URL.createObjectURL(file);
                        fileMap[entry.name] = fileURL;

                        // Create the list item
                        const li = document.createElement('li');
                        li.textContent = entry.name;
                        li.addEventListener('click', () => {
                            // Manage active classes
                            document.querySelectorAll('#page-list li').forEach(item => item.classList.remove('active'));
                            li.classList.add('active');

                            // Load file into iframe
                            placeholder.style.display = 'none';
                            contentViewer.style.display = 'block';
                            contentViewer.src = fileMap[entry.name];
                        });

                        pageList.appendChild(li);
                    }
                }

                if (Object.keys(fileMap).length === 0) {
                    alert('No .html files found in the selected folder.');
                }

            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error('Error reading directory:', err);
                    alert('Failed to open directory. Make sure your browser supports the File System Access API.');
                }
            }
        });
    </script>
</body>
</html>
