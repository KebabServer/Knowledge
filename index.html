<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project Index</title>
    <style>
        :root {
            --bg-color: #0d1117;       /* Deep dark background */
            --card-bg: #161b22;        /* Slightly lighter card background */
            --text-color: #c9d1d9;     /* Light gray text */
            --title-color: #f0f6fc;    /* Vibrant white text */
            --accent-color: #58a6ff;   /* Bright GitHub Blue */
            --border-color: #30363d;   /* Subdued border color */
            --radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #161b22;
            border-bottom: 1px solid var(--border-color);
            padding: 2.5rem 1rem;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
            color: var(--title-color);
        }

        header p {
            margin: 0.5rem 0 0 0;
            color: #8b949e;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1rem;
            box-sizing: border-box;
            flex: 1;
        }

        /* Category Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .category-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .category-card:hover {
            border-color: #8b949e;
            transform: translateY(-2px);
        }

        .category-title {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 1.2rem;
            color: var(--title-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .page-item {
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
        }

        .page-item:last-child {
            margin-bottom: 0;
        }

        /* Clean list icon styling */
        .page-item::before {
            content: "•";
            color: #8b949e;
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-left: 0.2rem;
        }

        .page-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .page-link:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
            color: #8b949e;
            border-top: 1px solid var(--border-color);
            background: var(--card-bg);
        }
    </style>
</head>
<body>

    <header>
        <h1>Knowledge Page</h1>
    </header>

    <div class="container">
        <div class="grid">

            <!-- CATEGORY 1 -->
            <section class="category-card">
                <h2 class="category-title">Games</h2>
                <ul class="page-list">
                    <li class="page-item"><a class="page-link" href="./d2r_classic/main.html">D2r Classic</a></li>
                    <li class="page-item"><a class="page-link" href="./projects/todo.html">D2r Expansion</a></li>
                </ul>
            </section>

            <!-- CATEGORY 2 -->
            <section class="category-card">
                <h2 class="category-title">🎨 Design Sandbox</h2>
                <ul class="page-list">
                    <li class="page-item"><a class="page-link" href="./design/landing-page.html">Landing Page Template</a></li>
                    <li class="page-item"><a class="page-link" href="./design/flexbox-grid.html">Flexbox Playground</a></li>
                </ul>
            </section>

            <!-- CATEGORY 3 -->
            <section class="category-card">
                <h2 class="category-title">📝 Notes & Docs</h2>
                <ul class="page-list">
                    <li class="page-item"><a class="page-link" href="./docs/cheatsheet.html">HTML/CSS Cheatsheet</a></li>
                    <li class="page-item"><a class="page-link" href="./docs/resources.html">Useful Links</a></li>
                </ul>
            </section>

        </div>
    </div>

</body>
</html>
